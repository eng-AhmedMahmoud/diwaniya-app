services:
  postgres:
    image: postgres:17-alpine
    container_name: diwaniya-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: diwaniya
      POSTGRES_PASSWORD: diwaniya
      POSTGRES_DB: diwaniya
    ports:
      - "55433:5432"
    volumes:
      - diwaniya-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diwaniya -d diwaniya"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  diwaniya-pg-data:
